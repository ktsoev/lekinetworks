server {
    listen 80;
    server_name leki.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name leki.example.com;

    # SSL — replace with your actual cert paths (e.g. Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/leki.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/leki.example.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Frontend static files
    root /opt/lekinetworks/lekinetworks.react/dist;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API → proxy (lekinetwork.proxy on port 8011 if co-hosted with Mint, else 8001)
    location /site/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:8001;
    }

    # Deny direct access to anything else
    location ~ /\. {
        deny all;
    }
}
